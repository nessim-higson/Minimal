<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nessim Higson — Design &amp; creative technology</title>
<meta name="description" content="Nessim Higson runs IAAH, an independent design practice making brands, websites, and interactive systems.">
<meta property="og:title" content="Nessim Higson">
<meta property="og:description" content="Design & creative technology. A quiet site that can say more.">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='24' fill='%23171614'/%3E%3Ccircle cx='50' cy='50' r='14' fill='%23ffe66e'/%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:ital,wght@0,400..700;1,400..700&family=Newsreader:ital,opsz,wght@1,6..72,300..500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css?v=2">
</head>
<body>

<a class="toast" id="toast" href="#" target="_blank" rel="noopener">
  <span class="av"></span>
  <span><b id="toast-title"></b><span id="toast-line"></span></span>
</a>

<main class="sheet">

  <section class="intro" id="intro">
    <h1 id="name" data-rise style="--d:.05s"></h1>
    <p class="role" id="role" data-rise style="--d:.12s"></p>
    <div class="bio" id="bio" data-rise style="--d:.22s" aria-live="polite"></div>
    <p class="dial-hint" data-rise style="--d:.32s">
      <span class="keys"><kbd id="lessK" title="Less">−</kbd><kbd id="moreK" title="More">+</kbd></span>
      <span>less or more about me</span>
    </p>
  </section>

  <h2 class="label" id="work" data-rise>Latest Work</h2>
  <div class="works-wrap">
    <div class="works" id="works" aria-label="Latest work carousel"></div>
    <div class="progress" aria-hidden="true"><i id="progress-bar"></i></div>
  </div>

  <div class="tabs" id="tabs" data-rise>
    <button class="on" data-tab="writing">Writing</button>
    <button data-tab="experiments">Experiments</button>
  </div>
  <div class="list" id="list"></div>

</main>

<footer class="footer">
  <div class="footer-inner" id="footer-inner">
    <div class="big" id="big"></div>
    <div class="cols">
      <span><a id="email" href="#"></a></span>
      <span class="mut" id="clock">—</span>
      <span class="mut" id="buildtag"></span>
    </div>
  </div>
</footer>

<div class="dock" role="group" aria-label="Site controls">
  <button id="less" title="Less about me" aria-label="Less about me">−</button>
  <div class="dots" id="dots" aria-hidden="true"><i></i><i class="on"></i><i></i><i></i></div>
  <button id="more" title="More about me" aria-label="More about me">+</button>
  <div class="sep"></div>
  <div class="ask" id="askWrap">
    <input id="ask" type="text" placeholder="Ask this site anything ⌘K" autocomplete="off" aria-label="Ask this site anything">
  </div>
</div>
<div class="answer" id="answer" role="status"></div>

<script src="content.js?v=2"></script>
<script src="app.js?v=3"></script>
</body>
</html>
