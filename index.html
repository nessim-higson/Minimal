<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nessim Higson — Design &amp; creative technology</title>
<meta name="description" content="Nessim Higson runs IAAH, an independent design practice making brands, websites, and interactive systems.">
<meta property="og:title" content="Nessim Higson">
<meta property="og:description" content="Design & creative technology. A quiet site that can say more.">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='24' fill='%23171614'/%3E%3Ccircle cx='50' cy='50' r='14' fill='%23ffe66e'/%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:ital,wght@0,400..700;1,400..700&family=Newsreader:ital,opsz,wght@1,6..72,300..500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css?v=10">
</head>
<body>

<!-- "Questions?" pill — expands into the ask field -->
<div class="island" id="island">
  <button class="q-pill" id="qPill" aria-label="Ask this site a question">
    <span class="q-dot"></span>
    <span class="q-label">Questions?</span>
  </button>
  <div class="ask" id="ask">
    <span class="q-dot"></span>
    <input id="askInput" type="text" placeholder="Ask this site anything…" autocomplete="off" aria-label="Ask this site anything">
    <button class="go" id="askGo" aria-label="Ask">↵</button>
  </div>
</div>
<div class="answer" id="answer" role="status"></div>

<div class="backdrop" aria-hidden="true"></div>

<div class="stage">
  <main class="sheet">

    <section class="intro" id="intro">
      <h1 data-rise style="--d:.05s">
        <span id="name"></span>
        <span class="dialctl" id="dialctl">
          <button id="less" aria-label="Less about me" hidden>−</button>
          <button id="more" aria-label="More about me">+</button>
        </span>
      </h1>
      <p class="role" id="role" data-rise style="--d:.12s"></p>
      <div class="bio" id="bio" aria-live="polite"></div>
    </section>

    <h2 class="label" id="work" data-rise>Latest Work</h2>
    <div class="works-wrap">
      <div class="works" id="works" aria-label="Latest work carousel"></div>
      <div class="progress" aria-hidden="true"><i id="progress-bar"></i></div>
    </div>

    <h2 class="label" id="writing" data-rise>Writing</h2>
    <div class="shelf" id="shelf" aria-label="Writing"></div>

  </main>
</div>

<!-- the dark room the sheet lifts off to reveal -->
<div class="room">
  <section class="lab" id="lab">
    <div class="lab-head" id="lab-head">
      <h2 class="label">Experiments &amp; Lab</h2>
      <p class="lab-sub">Half-finished on purpose. Everything here is alive.</p>
    </div>
    <div class="masonry" id="masonry"></div>
  </section>

  <footer class="footer">
    <div class="cols">
      <span><a id="email" href="#"></a></span>
      <span class="mut" id="clock">—</span>
      <span class="mut" id="buildtag"></span>
    </div>
  </footer>
</div>

<script src="content.js?v=10"></script>
<script src="app.js?v=10"></script>
</body>
</html>
